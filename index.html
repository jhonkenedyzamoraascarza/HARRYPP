<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>El Mapa de Jhon &amp; Flor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment: #e7d5a3;
    --parchment-2: #dcc48a;
    --parchment-shadow: #b89c62;
    --ink: #3c2a15;
    --ink-deep: #241705;
    --ink-faint: rgba(60,42,21,0.45);
    --gold: #c39a3f;
    --gold-bright: #ecc568;
    --wax: #7c1c22;
    --wax-dark: #4f1015;
    --night-1: #06070f;
    --night-2: #171029;
    --night-3: #241735;
    --glow: #ffe6a0;
    --glow-soft: rgba(255,230,160,0.55);
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background: radial-gradient(ellipse at 50% 20%, var(--night-3), var(--night-2) 45%, var(--night-1) 100%);
    overflow:hidden;
    font-family:'EB Garamond', serif;
    color: var(--ink);
  }

  #stage{
    position:relative; width:100vw; height:100vh; height:100dvh;
    display:grid; place-items:center;
    overflow:hidden;
  }

  /* ---------- Ambient night background ---------- */
  #sky{ position:absolute; inset:0; overflow:hidden; }
  .star{
    position:absolute; width:2px; height:2px; border-radius:50%;
    background: var(--glow);
    opacity:.6;
    animation: twinkle 3.5s ease-in-out infinite;
  }
  @keyframes twinkle{ 0%,100%{opacity:.15; transform:scale(1);} 50%{opacity:.9; transform:scale(1.6);} }

  .drift-mote{
    position:absolute; width:3px; height:3px; border-radius:50%;
    background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
    opacity:.5;
    animation: drift 18s linear infinite;
  }
  @keyframes drift{
    0%{ transform: translate(0,0); opacity:0; }
    10%{opacity:.6;}
    90%{opacity:.4;}
    100%{ transform: translate(var(--dx,40px), -220px); opacity:0; }
  }

  /* ---------- Cover: folded Marauder's Map, opens down the middle ---------- */
  #cover{
    grid-area: 1 / 1;
    position:relative; z-index:5; cursor:pointer;
    width:min(92vw, 540px); aspect-ratio: 4/3;
    perspective: 1900px;
    transition: opacity .55s ease .55s;
  }
  #cover.hidden{ opacity:0; pointer-events:none; }

  .cover-half{
    position:absolute; top:0; bottom:0; width:50%; overflow:hidden;
    background:
      radial-gradient(160% 130% at 30% 20%, rgba(255,255,255,0.10), transparent 55%),
      linear-gradient(160deg, var(--parchment) 0%, var(--parchment-2) 55%, var(--parchment-shadow) 100%);
    box-shadow: 0 25px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(60,42,21,.35) inset;
    filter: url(#paperGrain);
    backface-visibility:hidden;
    transition: transform .95s cubic-bezier(.7,0,.3,1), opacity .8s ease .05s;
  }
  .cover-half::before{
    content:""; position:absolute; inset:0;
    background: repeating-linear-gradient(0deg, rgba(60,42,21,0.03) 0 2px, transparent 2px 4px);
    mix-blend-mode: multiply; pointer-events:none;
  }
  .cover-half.left{ left:0; border-radius:6px 0 0 6px; transform-origin: left center; }
  .cover-half.right{ right:0; border-radius:0 6px 6px 0; transform-origin: right center; }
  .fold-lines{ position:absolute; inset:0; opacity:.55; pointer-events:none; }

  #cover.opened .cover-half.left{ transform: rotateY(-112deg); opacity:0; }
  #cover.opened .cover-half.right{ transform: rotateY(112deg); opacity:0; }

  .cover-crease{
    position:absolute; top:3%; bottom:3%; left:50%; width:2px; margin-left:-1px;
    background: linear-gradient(180deg, transparent, rgba(60,42,21,.5) 12%, rgba(60,42,21,.5) 88%, transparent);
    z-index:3; pointer-events:none; transition: opacity .4s ease;
  }
  #cover.opened .cover-crease{ opacity:0; }

  .cover-label{
    position:absolute; top:5.5%; left:0; right:0; text-align:center; z-index:3;
    font-family:'IM Fell English SC', serif; letter-spacing:.32em; font-size: clamp(.6rem,2.2vw,.8rem);
    color: var(--ink-faint); text-transform:uppercase; transition: opacity .4s ease;
  }
  #cover.opened .cover-label{ opacity:0; }

  .cover-inner{
    position:absolute; inset:0; z-index:4;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding: 6% 12%; pointer-events:none;
    transition: opacity .4s ease;
  }
  #cover.opened .cover-inner{ opacity:0; }

  .cover-castle{
    position:absolute; left:50%; bottom:5%; transform:translateX(-50%);
    width: 76%; max-width: 340px; opacity:.24; z-index:0; pointer-events:none;
  }
  .cover-castle svg{ width:100%; height:auto; display:block; }

  .cover-text-wrap{
    position:relative; z-index:1;
    display:flex; flex-direction:column; align-items:center;
  }

  .cover-eyebrow{
    font-family:'IM Fell English SC', serif; letter-spacing:.28em; font-size:.72rem;
    color: var(--ink-faint); text-transform:uppercase; margin-bottom:14px;
  }
  .cover-title{
    font-family:'Dancing Script', cursive; font-weight:700;
    font-size: clamp(1.5rem, 6vw, 2.3rem); color: var(--ink-deep);
    line-height:1.15; text-shadow: 0 1px 0 rgba(255,255,255,.15);
    margin: 0 0 18px;
  }
  .cover-sub{
    font-family:'IM Fell English', serif; font-style:italic; font-size: clamp(.85rem, 2.6vw, 1rem);
    color: var(--ink); opacity:.75; margin-bottom: 22px;
  }
  .wax-seal{
    width: 78px; height:78px; margin: 6px auto 0; position:relative;
  }
  .wax-seal svg{ width:100%; height:100%; filter: drop-shadow(0 6px 8px rgba(0,0,0,.45)); }
  .cover-hint{
    margin-top:20px; font-family:'IM Fell English', serif; font-style:italic;
    font-size:.78rem; color: var(--ink-faint); letter-spacing:.05em;
    animation: hintPulse 2.4s ease-in-out infinite;
  }
  @keyframes hintPulse{ 0%,100%{opacity:.45;} 50%{opacity:.95;} }

  /* ---------- Map App ---------- */
  #map-app{
    grid-area: 1 / 1;
    position:relative; z-index:6;
    width:min(94vw, 620px); height:min(86vh, 780px);
    opacity:0; transform: scale(.85);
    pointer-events:none;
    transition: opacity .9s ease .15s, transform .9s cubic-bezier(.2,.8,.2,1) .15s;
  }
  #map-app.visible{ opacity:1; transform:scale(1); pointer-events:auto; }

  .map-frame{
    position:relative; width:100%; height:100%; border-radius:10px;
    background:
      radial-gradient(140% 100% at 15% 0%, rgba(255,255,255,.12), transparent 50%),
      radial-gradient(120% 90% at 85% 100%, rgba(0,0,0,.10), transparent 55%),
      linear-gradient(155deg, var(--parchment) 0%, var(--parchment-2) 50%, var(--parchment-shadow) 100%);
    box-shadow: 0 30px 70px rgba(0,0,0,.7), 0 0 0 1px rgba(60,42,21,.4) inset, 0 0 0 9px rgba(60,42,21,.06) inset;
    filter: url(#paperGrain);
    overflow:hidden;
  }
  .ink-border{
    position:absolute; inset:14px; border:2px solid var(--ink);
    opacity:.55; border-radius:4px; pointer-events:none;
  }
  .ink-border::before{
    content:""; position:absolute; inset:6px; border:1px solid var(--ink);
    opacity:.5; border-radius:2px;
  }
  .corner-flourish{ position:absolute; width:46px; height:46px; opacity:.65; pointer-events:none; }
  .corner-flourish.tl{ top:16px; left:16px; }
  .corner-flourish.tr{ top:16px; right:16px; transform:scaleX(-1); }
  .corner-flourish.bl{ bottom:16px; left:16px; transform:scaleY(-1); }
  .corner-flourish.br{ bottom:16px; right:16px; transform:scale(-1,-1); }

  .compass{
    position:absolute; top:22px; right:26px; width:52px; height:52px; opacity:.8;
    animation: compassSway 9s ease-in-out infinite;
    transform-origin:50% 50%;
  }
  @keyframes compassSway{ 0%,100%{transform:rotate(-4deg);} 50%{transform:rotate(4deg);} }

  .map-header{
    position:relative; z-index:3; text-align:center; padding: 26px 20px 6px;
  }
  .map-title{
    font-family:'Dancing Script', cursive; font-weight:700; color:var(--ink-deep);
    font-size: clamp(1.15rem, 4vw, 1.55rem); margin:0;
  }
  .map-title-rule{
    width:120px; height:6px; margin: 6px auto 0; opacity:.7;
  }

  .mute-btn{
    position:absolute; top:18px; left:18px; width:34px; height:34px;
    background:transparent; border:none; cursor:pointer; padding:4px;
    opacity:.75; transition: opacity .2s, transform .2s;
  }
  .mute-btn:hover{ opacity:1; transform:scale(1.08); }
  .mute-btn svg{ width:100%; height:100%; }

  /* ---------- Page viewport ---------- */
  .page-viewport{
    position:relative; z-index:2; height: calc(100% - 158px);
    margin: 4px 30px 0; perspective: 1400px;
  }
  .page{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center;
    padding: 6px 8px 0;
    backface-visibility:hidden;
    transform-origin: left center;
    transition: transform .75s cubic-bezier(.61,.06,.15,.99), opacity .55s ease;
  }
  .page.current{ position:relative; transform: rotateY(0deg); opacity:1; z-index:2; }
  .page.leaving-next{ transform: rotateY(-130deg); opacity:0; z-index:1; }
  .page.leaving-prev{ transform: rotateY(130deg); opacity:0; z-index:1; }
  .page.entering{ transform: rotateY(0deg); opacity:1; }

  .page-label{
    font-family:'IM Fell English SC', serif; letter-spacing:.22em; text-transform:uppercase;
    font-size: clamp(.62rem, 2vw, .74rem); color: var(--ink-faint); margin-bottom: 4px;
  }

  .icon-row{
    position:relative; width:100%;
    height: clamp(78px, 17vw, 106px); margin: 4px 0 6px;
    display:flex; align-items:center; justify-content:center;
  }
  .page-icon{
    position:relative; z-index:2;
    width: clamp(64px, 15vw, 92px); height: clamp(64px, 15vw, 92px);
    opacity:0; transform: translateY(10px) scale(.9);
    animation: iconIn .8s ease forwards .15s;
    filter: drop-shadow(0 3px 5px rgba(60,42,21,.35));
  }
  @keyframes iconIn{ to{ opacity:1; transform: translateY(0) scale(1); } }

  /* --- flyby: elements that cross the page --- */
  .fly-lane{ position:absolute; inset:0; overflow:visible; pointer-events:none; z-index:1; }
  .cross-fly{
    position:absolute; top:50%; width:38px; height:38px; margin-top:-19px;
    animation: crossPass var(--fly-dur,5s) linear infinite;
    animation-delay: var(--fly-delay, 0s);
    opacity:0;
  }
  @keyframes crossPass{
    0%{ left:-14%; transform:translateY(0); opacity:0; }
    9%{ opacity:.95; }
    42%{ transform:translateY(var(--fly-y,-14px)); }
    60%{ transform:translateY(0); }
    91%{ opacity:.95; }
    100%{ left:114%; transform:translateY(0); opacity:0; }
  }
  .wing-flap{ animation: wingFlap .22s ease-in-out infinite; transform-origin:center; transform-box:fill-box; }
  @keyframes wingFlap{ 0%,100%{ transform:scaleY(1);} 50%{ transform:scaleY(.5);} }
  .flutter-el{ animation: flutterMv .7s ease-in-out infinite; transform-origin:center; transform-box:fill-box; }
  @keyframes flutterMv{ 0%,100%{ transform:rotate(-7deg);} 50%{ transform:rotate(7deg);} }

  /* --- flyby: rising particles (bubbles, steam, sparks, light, hearts) --- */
  .particle{
    position:absolute; bottom:4%; border-radius:50%;
    animation: riseUp var(--p-dur,3.2s) ease-in infinite;
    animation-delay: var(--p-delay,0s);
    opacity:0;
  }
  @keyframes riseUp{
    0%{ transform: translateY(0) scale(.55); opacity:0; }
    16%{ opacity:.85; }
    82%{ opacity:.5; }
    100%{ transform: translateY(-64px) scale(1); opacity:0; }
  }

  /* --- flyby: sparkle trail (wand) --- */
  .spark{
    position:absolute; width:6px; height:6px; border-radius:50%;
    background: radial-gradient(circle, #fff6d8, #ecc568 60%, transparent 75%);
    animation: sparkPulse 1.7s ease-in-out infinite;
    animation-delay: var(--s-delay,0s);
    opacity:0;
  }
  @keyframes sparkPulse{
    0%{ opacity:0; transform:scale(.4); }
    30%{ opacity:1; transform:scale(1); }
    70%{ opacity:.5; }
    100%{ opacity:0; transform:scale(.3); }
  }

  /* --- flyby: mirror shimmer sweep --- */
  .icon-row.type-mirror .page-icon{ overflow:hidden; border-radius:50%; }
  .icon-row.type-mirror .page-icon::after{
    content:""; position:absolute; top:0; left:-160%; width:55%; height:100%;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,.6), transparent);
    animation: sweep 3.6s ease-in-out infinite;
  }
  @keyframes sweep{ 0%{ left:-160%; } 55%{ left:160%; } 100%{ left:160%; } }

  /* --- flyby: time-turner continuous spin --- */
  .icon-row.type-timeturner .page-icon svg{
    animation: spinSlow 7s linear infinite; transform-origin:50% 50%;
  }
  @keyframes spinSlow{ from{ transform:rotate(0deg);} to{ transform:rotate(360deg);} }

  .phrase-wrap{
    position:relative; width:100%; max-width: 480px; margin: 0 auto;
    flex: 1 1 auto; display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    padding-top: 4px; gap: 12px; min-height:0;
  }
  .phrase{
    font-family:'Dancing Script', cursive; font-weight:600; color: var(--ink-deep);
    font-size: clamp(1.15rem, 4.1vw, 1.62rem); line-height:1.42; text-align:center;
  }
  .phrase .word{
    display:inline-block; opacity:0; filter: blur(2px);
    transform: translateY(4px);
    transition: opacity .35s ease, filter .35s ease, transform .35s ease;
  }
  .phrase .word.shown{ opacity:1; filter: blur(0); transform:translateY(0); }

  .wand-cursor{
    position:absolute; top:-6px; left:0; width:30px; height:30px;
    opacity:0; pointer-events:none; z-index:5;
    transition: left .12s linear, top .18s ease;
  }
  .wand-cursor.active{ opacity:1; }
  .wand-tip-glow{
    animation: tipPulse 1s ease-in-out infinite;
  }
  @keyframes tipPulse{ 0%,100%{ opacity:.75; r:3; } 50%{ opacity:1; r:5; } }

  .below-illustration{
    width: clamp(130px, 38vw, 230px); opacity:0; transform: translateY(8px);
    animation: illoIn 1s ease forwards .4s;
    filter: drop-shadow(0 3px 5px rgba(60,42,21,.25));
    pointer-events:none; flex-shrink:0;
  }
  .below-illustration svg{ width:100%; height:auto; display:block; }
  @keyframes illoIn{ to{ opacity:.95; transform: translateY(0); } }

  @media (max-width: 480px){
    .below-illustration{ width: clamp(104px, 32vw, 170px); }
    .phrase-wrap{ gap: 6px; }
  }

  /* ---------- Footer path & Harry ---------- */
  .footer-track{
    position:relative; z-index:2; height: 84px; margin: 0 24px 14px;
    border-top: 1px dashed rgba(60,42,21,.35);
  }
  .footprints{
    position:absolute; top:8px; left:0; right:0; height:16px;
    display:flex; align-items:center; opacity:.28;
  }

  #harry{
    position:absolute; bottom:6px; left:0;
    width: 46px; height:64px;
    transform: translateX(0) scaleX(1);
    animation: none;
    z-index:2;
  }

  .footstep{
    position:absolute; width:8px; height:4px; border-radius:50%;
    background: rgba(60,42,21,.42);
    opacity:.6; z-index:1;
    transition: opacity 1.3s ease, transform 1.3s ease;
  }
  .footstep.fade{ opacity:0; transform: scale(.7); }
  .harry-bob{ animation: bob .5s ease-in-out infinite; transform-origin:center bottom; }
  @keyframes bob{ 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-3px);} }

  .leg{ transform-origin: 23px 40px; animation: none; }
  .leg-l{ animation: legSwingL .5s ease-in-out infinite; }
  .leg-r{ animation: legSwingR .5s ease-in-out infinite; }
  @keyframes legSwingL{ 0%,100%{ transform: rotate(18deg);} 50%{ transform: rotate(-18deg);} }
  @keyframes legSwingR{ 0%,100%{ transform: rotate(-18deg);} 50%{ transform: rotate(18deg);} }

  .arm-wand{ transform-origin: 30px 26px; animation: armSway 1.4s ease-in-out infinite; }
  @keyframes armSway{ 0%,100%{ transform: rotate(-6deg);} 50%{ transform: rotate(4deg);} }

  .harry-wandtip{ animation: tipPulse 1s ease-in-out infinite; }

  /* ---------- Nav controls ---------- */
  .nav-btn{
    position:absolute; top:50%; transform: translateY(-50%);
    width: 46px; height:46px; border:none; cursor:pointer; z-index:8;
    background:transparent; opacity:.8; transition: opacity .2s, transform .2s;
  }
  .nav-btn:hover{ opacity:1; }
  .nav-btn.prev{ left: 2px; }
  .nav-btn.next{ right: 2px; }
  .nav-btn:active{ transform: translateY(-50%) scale(.9); }
  .nav-btn svg{ width:100%; height:100%; }

  .page-indicator{
    position:absolute; left:0; right:0; bottom: 6px; z-index:3;
    text-align:center; font-family:'IM Fell English', serif; font-style:italic;
    font-size:.72rem; color: var(--ink-faint); letter-spacing:.05em;
  }

  /* ---------- Final page flourish ---------- */
  .final-heart{ width: 74px; height:74px; }

  /* ---------- Reduced motion ---------- */
  @media (prefers-reduced-motion: reduce){
    .drift-mote, .star, .compass, .harry-bob, .leg-l, .leg-r, .arm-wand, .wand-tip-glow, .harry-wandtip, .cover-hint{
      animation: none !important;
    }
  }

  @media (max-width: 480px){
    .page-viewport{ margin: 4px 14px 0; }
    .footer-track{ margin: 0 12px 10px; }
    .map-header{ padding-top: 20px; }
  }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <filter id="paperGrain">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
    <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.24  0 0 0 0 0.17  0 0 0 0 0.08  0 0 0 0.045 0"/>
    <feComposite operator="over" in2="SourceGraphic"/>
  </filter>

  <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5"/>
  </filter>

  <radialGradient id="washGold" cx="45%" cy="45%" r="60%">
    <stop offset="0%" stop-color="#f3d27a" stop-opacity=".85"/>
    <stop offset="100%" stop-color="#f3d27a" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="washBlue" cx="45%" cy="45%" r="60%">
    <stop offset="0%" stop-color="#9fc3d6" stop-opacity=".75"/>
    <stop offset="100%" stop-color="#9fc3d6" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="washRed" cx="45%" cy="45%" r="60%">
    <stop offset="0%" stop-color="#c98a8f" stop-opacity=".7"/>
    <stop offset="100%" stop-color="#c98a8f" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="washPurple" cx="45%" cy="45%" r="60%">
    <stop offset="0%" stop-color="#a89bc9" stop-opacity=".65"/>
    <stop offset="100%" stop-color="#a89bc9" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="washSilver" cx="45%" cy="45%" r="60%">
    <stop offset="0%" stop-color="#c7d3d6" stop-opacity=".7"/>
    <stop offset="100%" stop-color="#c7d3d6" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="washGreen" cx="45%" cy="45%" r="60%">
    <stop offset="0%" stop-color="#a9c08a" stop-opacity=".65"/>
    <stop offset="100%" stop-color="#a9c08a" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="washSlytherin" cx="45%" cy="45%" r="65%">
    <stop offset="0%" stop-color="#48a97c" stop-opacity=".85"/>
    <stop offset="70%" stop-color="#2d6a4f" stop-opacity=".35"/>
    <stop offset="100%" stop-color="#2d6a4f" stop-opacity="0"/>
  </radialGradient>

  <symbol id="flourish" viewBox="0 0 100 100">
    <g fill="none" stroke="#3c2a15" stroke-width="1.6" stroke-linecap="round" opacity=".75">
      <path d="M10 90 C22 70 16 48 34 40 C52 32 46 16 64 10 C74 6 78 2 90 4"/>
      <path d="M34 40 C24 38 16 40 12 50 C9 58 14 64 20 62 C26 60 24 50 18 52"/>
      <path d="M64 10 C58 4 48 4 44 12 C40 20 48 24 52 20"/>
      <path d="M52 32 C48 26 50 20 58 19"/>
    </g>
    <g fill="#3c2a15" opacity=".7">
      <path d="M90 4 C92 1 95 3 94 6 C92 8 88 6 90 4 Z"/>
      <path d="M78 8 C80 6 82 8 81 10 Z"/>
      <circle cx="92" cy="12" r="1.6"/>
      <circle cx="86" cy="18" r="1.2"/>
      <circle cx="76" cy="15" r="1.4"/>
      <circle cx="12" cy="50" r="1.8"/>
      <circle cx="8" cy="60" r="1.4"/>
      <circle cx="4" cy="68" r="1.1"/>
      <circle cx="58" cy="19" r="1.5"/>
    </g>
  </symbol>
</svg>

<div id="stage">
  <div id="sky"></div>

  <!-- ============ COVER: folded Marauder's Map ============ -->
  <div id="cover" role="button" tabindex="0" aria-label="Abrir el mapa">
    <div class="cover-half left">
      <svg class="fold-lines" viewBox="0 0 100 133" preserveAspectRatio="none">
        <path d="M100 18 L4 26 M100 54 L2 60 M100 90 L4 96 M100 118 L6 122" stroke="#3c2a15" stroke-width=".55" fill="none"/>
      </svg>
    </div>
    <div class="cover-half right">
      <svg class="fold-lines" viewBox="0 0 100 133" preserveAspectRatio="none">
        <path d="M0 18 L96 26 M0 54 L98 60 M0 90 L96 96 M0 118 L94 122" stroke="#3c2a15" stroke-width=".55" fill="none"/>
      </svg>
    </div>
    <div class="cover-crease"></div>

  /* ---------------- Flyby animation builders ---------------- */
  function particles(n, colorFn, sizeFn, opts={}){
    let html = '';
    for(let i=0;i<n;i++){
      const left = opts.spread ? (opts.left0 + Math.random()*opts.spread) : (10 + Math.random()*80);
      const dur = (opts.durMin||2.6) + Math.random()*(opts.durRange||1.4);
      const delay = Math.random()*(opts.delayMax||3.2);
      const size = sizeFn ? sizeFn() : (4+Math.random()*4);
      html += `<div class="particle" style="left:${left}%; width:${size}px; height:${size}px; background:${colorFn()}; --p-dur:${dur}s; --p-delay:${delay}s;"></div>`;
    }
    return `<div class="fly-lane">${html}</div>`;
  }

  function crossFly(innerSvg, opts={}){
    const dur = opts.dur || 5.2;
    const delay = opts.delay || 0.3;
    const y = opts.y != null ? opts.y : -14;
    return `<div class="fly-lane"><div class="cross-fly" style="--fly-dur:${dur}s; --fly-delay:${delay}s; --fly-y:${y}px;">${innerSvg}</div></div>`;
  }

    potion: ()=> particles(5, ()=> 'radial-gradient(circle, #fff3cf, #ecc568 65%, transparent 78%)', ()=>3+Math.random()*4, {durMin:2.4, durRange:1.6, delayMax:3.4}),
    patronus: ()=> crossFly(
      `<svg viewBox="0 0 100 60" width="64" height="40"><g fill="none" stroke="#ffe9a8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity=".9">
        <path d="M8 44 L20 26 C24 18 34 16 40 22 L46 30 L54 20 C60 14 70 16 74 24 L80 44"/>
        <path d="M20 26 L14 14 M46 30 L44 16 M20 44 L20 52 M40 44 L40 54 M60 44 L60 52 M74 44 L76 54"/>
      </g></svg>`, {dur:4.4, delay:.4, y:-10}
    ),
    platform: ()=> particles(4, ()=> 'radial-gradient(circle, rgba(255,255,255,.85), rgba(255,255,255,.05) 70%)', ()=>6+Math.random()*6, {left0:6, spread:22, durMin:2.8, durRange:1.6, delayMax:3}),

  /* ---------------- Content: the pages ---------------- */
  const PAGES = [
    { label:"Página I · Felix Felicis", icon:"potion",
      phrase:"Flor, contigo no necesito Felix Felicis para que todo salga perfecto." },
    { label:"Página II · El Patronus", icon:"patronus",

  /* ---------------- State ---------------- */
  let current = 0;
  let animToken = 0;
  const viewport = document.getElementById('pageViewport');
  const indicator = document.getElementById('pageIndicator');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const harry = document.getElementById('harry');
  const footTrack = document.querySelector('.footer-track');

  function buildPageEl(data, idx){
    const el = document.createElement('div');
    el.className = 'page current';
    const words = data.phrase.split(' ').map(w=>`<span class="word">${w}</span>`).join(' ');
    const flyHtml = FLYBY[data.icon] ? FLYBY[data.icon]() : '';
    const illoHtml = ILLU[data.icon] ? `<div class="below-illustration">${ILLU[data.icon]}</div>` : '';
    el.innerHTML = `
      <div class="page-label">${data.label}</div>
      <div class="icon-row type-${data.icon}">
        ${flyHtml}
        <div class="page-icon">${ICONS[data.icon]}</div>
      </div>
      <div class="phrase-wrap">
        <svg class="wand-cursor" viewBox="0 0 40 40" id="wandCursor-${idx}">
          <rect x="6" y="18" width="22" height="4" rx="2" fill="#5a3d1e" transform="rotate(-30 17 20)"/>
          <circle class="wand-tip-glow" cx="30" cy="9" r="3.4" fill="#ffe6a0"/>
        </svg>
        <p class="phrase">${words}</p>
        ${illoHtml}
      </div>
    `;
    return el;
  }

  function renderInitial(){
    const el = buildPageEl(PAGES[0], 0);
    viewport.appendChild(el);
    updateIndicator();
    revealWords(el, 0);
  }

  function updateIndicator(){
    indicator.textContent = `~ ${current+1} de ${PAGES.length} ~`;
    prevBtn.style.visibility = current===0 ? 'hidden':'visible';
    nextBtn.style.visibility = current===PAGES.length-1 ? 'hidden':'visible';
  }

  function revealWords(pageEl, idx){
    const myToken = ++animToken;
    const words = pageEl.querySelectorAll('.word');
    const cursor = pageEl.querySelector('.wand-cursor');
    if(!words.length) return;
    let i = 0;
    cursor.classList.add('active');

    function step(){
      if(myToken !== animToken) return;
      if(i >= words.length){
        cursor.classList.remove('active');
        return;
      }
      const w = words[i];
      w.classList.add('shown');
      const wRect = w.getBoundingClientRect();
      const wrapRect = pageEl.querySelector('.phrase-wrap').getBoundingClientRect();
      cursor.style.left = (wRect.left - wrapRect.left) + 'px';
      cursor.style.top = (wRect.top - wrapRect.top - 24) + 'px';
      playChime(i);
      i++;
      setTimeout(step, 190);
    }
    step();
  }

  function goTo(newIndex, dir){
    if(newIndex < 0 || newIndex >= PAGES.length || newIndex === current) return;
    const oldEl = viewport.querySelector('.page.current');
    const newEl = buildPageEl(PAGES[newIndex], newIndex);
    newEl.classList.remove('current');
    newEl.classList.add(dir > 0 ? 'leaving-next' : 'leaving-prev');
    viewport.appendChild(newEl);

    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        oldEl.classList.remove('current');
        oldEl.classList.add(dir > 0 ? 'leaving-next' : 'leaving-prev');
        newEl.classList.remove('leaving-next','leaving-prev');
        newEl.classList.add('current','entering');
      });
    });

    setTimeout(()=>{ if(oldEl && oldEl.parentNode) oldEl.parentNode.removeChild(oldEl); }, 800);

    current = newIndex;
    updateIndicator();
    setTimeout(()=> revealWords(newEl, newIndex), 300);
  }

  prevBtn.addEventListener('click', ()=> goTo(current-1, -1));
  nextBtn.addEventListener('click', ()=> goTo(current+1, 1));
  window.addEventListener('keydown', (e)=>{
    if(!document.getElementById('map-app').classList.contains('visible')) return;
    if(e.key === 'ArrowRight') goTo(current+1, 1);
    if(e.key === 'ArrowLeft') goTo(current-1, -1);
  });

  let touchX = null;
  document.getElementById('map-app').addEventListener('touchstart', e=>{ touchX = e.touches[0].clientX; });
  document.getElementById('map-app').addEventListener('touchend', e=>{
    if(touchX===null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if(dx < -40) goTo(current+1, 1);
    if(dx > 40) goTo(current-1, -1);
    touchX = null;
  });

  /* ---------------- Harry walking along footer ---------------- */
  function layoutFootprints(){
    const fp = document.getElementById('footprints');
    fp.innerHTML = '';
    const w = footTrack.clientWidth;
    const count = Math.floor(w / 26);
    for(let i=0;i<count;i++){
      const dot = document.createElement('div');
      dot.style.width='3px'; dot.style.height='3px'; dot.style.borderRadius='50%';
      dot.style.background = 'rgba(60,42,21,.5)';
      dot.style.marginLeft = i===0 ? '4px':'23px';
      dot.style.display='inline-block';
      fp.appendChild(dot);
    }
  }

  let harryDir = 1;
  let harryX = 0;
  function walkHarry(){
    const trackW = footTrack.clientWidth;
    const harryW = harry.getBoundingClientRect().width || 46;
    const maxX = Math.max(trackW - harryW, 10);
    const speed = 0.55; // px per frame tick
    harryX += speed * harryDir;
    if(harryX >= maxX){ harryX = maxX; harryDir = -1; }
    if(harryX <= 0){ harryX = 0; harryDir = 1; }
    const flip = harryDir < 0 ? -1 : 1;
    harry.style.transform = `translateX(${harryX}px) scaleX(${flip})`;
    requestAnimationFrame(walkHarry);
  }

  let footstepTimer = null;
  let stepToggle = true;
  function startFootstepTrail(){
    if(footstepTimer) clearInterval(footstepTimer);
    footstepTimer = setInterval(()=>{
      const harryW = harry.getBoundingClientRect().width || 46;
      const trailingEdge = harryDir > 0 ? harryX + 6 : harryX + harryW - 12;
      const step = document.createElement('div');
      step.className = 'footstep';
      step.style.left = trailingEdge + 'px';
      step.style.bottom = (stepToggle ? '3px' : '9px');
      step.style.transform = `rotate(${stepToggle ? -10 : 10}deg)`;
      footTrack.appendChild(step);
      stepToggle = !stepToggle;
      requestAnimationFrame(()=> requestAnimationFrame(()=>{
        step.classList.add('fade');
      }));
      setTimeout(()=>{ if(step.parentNode) step.parentNode.removeChild(step); }, 1500);
    }, 340);
  }

  /* ---------------- Music box (Hedwig's Theme) ---------------- */
  let audioCtx = null;
  let musicOn = true;
  let musicTimer = null;
  
  const B4 = 493.88, B5 = 987.77, Dsh6 = 1244.51, E6 = 1318.51, F6 = 1396.91, Fsh6 = 1479.98, G6 = 1567.98, Gsh6 = 1661.22, A6 = 1760.00, Ash6 = 1864.66, B6 = 1975.53, C7 = 2093.00, Csh7 = 2217.46, D7 = 2349.32;
  const bpm = 160; 
  const q = 60000 / bpm; // quarter note
  const dq = q * 1.5; 
  const e = q / 2; 
  const h = q * 2; 
  const dh = q * 3; 

  const melodySeq = [
    {f: B5, d: q},
    {f: E6, d: dq}, {f: G6, d: e}, {f: Fsh6, d: q},
    {f: E6, d: h}, {f: B6, d: q},
    {f: A6, d: dh},
    {f: Fsh6, d: dh},
    {f: E6, d: dq}, {f: G6, d: e}, {f: Fsh6, d: q},
    {f: Dsh6, d: h}, {f: F6, d: q},
    {f: B5, d: dh},
    {f: 0, d: q}, {f: B5, d: q},
    {f: E6, d: dq}, {f: G6, d: e}, {f: Fsh6, d: q},
    {f: E6, d: h}, {f: B6, d: q},
    {f: D7, d: h}, {f: Csh7, d: q},
    {f: C7, d: h}, {f: Gsh6, d: q},
    {f: C7, d: dq}, {f: B6, d: e}, {f: Ash6, d: q},
    {f: B5, d: h}, {f: G6, d: q},
    {f: E6, d: dh},
    {f: 0, d: h} // Pequeña pausa al final antes de repetir
  ];
  let seqIdx = 0;

  function ensureAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
  }

  // Timbre tipo "tine" de caja musical: fundamental + ligero batido + armónico de octava suave,
  // con un pequeño "wobble" de afinación que imita el mecanismo de cuerda real.
  function playTone(freq, time, dur, gainPeak){
    const wobble = 1 + (Math.random()*0.006 - 0.003);
    const osc = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const osc3 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const gain3 = audioCtx.createGain();
    osc.type = 'sine';
    osc2.type = 'sine';
    osc3.type = 'triangle';
    osc.frequency.setValueAtTime(freq*wobble, time);
    osc2.frequency.setValueAtTime(freq*wobble*1.006, time);
    osc3.frequency.setValueAtTime(freq*wobble*2.0, time);
    gain3.gain.value = 0.16;
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.linearRampToValueAtTime(gainPeak, time + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + dur);
    osc.connect(gain); osc2.connect(gain);
    osc3.connect(gain3); gain3.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(time); osc2.start(time); osc3.start(time);
    osc.stop(time + dur + 0.05); osc2.stop(time + dur + 0.05); osc3.stop(time + dur + 0.05);
  }

  function musicStep(){
    if(!musicOn || !audioCtx) return;
    const now = audioCtx.currentTime;
    const step = melodySeq[seqIdx % melodySeq.length];
    if (step.f > 0) {
      playTone(step.f, now, (step.d/1000)*0.85, 0.045);
      // Acompañamiento armónico sutil
      if(seqIdx % 4 === 0){
        playTone(step.f/2, now, (step.d/1000)*1.15, 0.015);
      }
    }
    seqIdx++;
    musicTimer = setTimeout(musicStep, step.d);
  }

  function playChime(i){
    if(!musicOn || !audioCtx) return;
    const chimeNotes = [B5, E6, G6, B6, C7];
    const note = chimeNotes[(i+2) % chimeNotes.length];
    playTone(note*1.5, audioCtx.currentTime, 0.35, 0.026);
  }

  function startMusic(){
    ensureAudio();
    if(musicTimer) clearTimeout(musicTimer);
    musicStep();
  }
  function stopMusic(){
    if(musicTimer) clearTimeout(musicTimer);
  }

  const muteBtn = document.getElementById('muteBtn');
  const muteSlash = document.getElementById('muteSlash');
  muteBtn.addEventListener('click', ()=>{
    musicOn = !musicOn;
    muteSlash.style.display = musicOn ? 'none' : 'block';
    if(musicOn){ startMusic(); } else { stopMusic(); }
  });

  /* ---------------- Open cover ---------------- */
  const cover = document.getElementById('cover');
  const mapApp = document.getElementById('map-app');

  function openMap(){
    ensureAudio();
    cover.classList.add('opened');
    setTimeout(()=>{ cover.classList.add('hidden'); }, 520);
    setTimeout(()=>{
      mapApp.classList.add('visible');
      layoutFootprints();
      requestAnimationFrame(walkHarry);
      startFootstepTrail();
      startMusic();
    }, 480);
    cover.removeEventListener('click', openMap);
  }
  cover.addEventListener('click', openMap);
  cover.addEventListener('keydown', (e)=>{ if(e.key==='Enter' || e.key===' ') openMap(); });

  window.addEventListener('resize', layoutFootprints);

  renderInitial();
})();
</script>
</body>
